<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(#020617, #0b0f14);
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0f172a;
  padding: 14px;
  border-radius: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.08);
}

.live {
  background: linear-gradient(45deg, #7c3aed, #ec4899);
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
}

.video-card {
  background: #0f172a;
  padding: 10px;
  border-radius: 20px;
  margin-bottom: 18px;
}

video {
  width: 100%;
  border-radius: 15px;
  background: #000;
}

/* Cards */
.card {
  background: #0f172a;
  padding: 22px 18px;
  border-radius: 20px;
  margin-bottom: 18px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}

.card h3 {
  margin-bottom: 18px;
  color: #9ca3af;
}

/* Buttons */
.big-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  background: linear-gradient(90deg, #6366f1, #a855f7, #d946ef);
  box-shadow: 0 4px 20px rgba(168,85,247,0.4);
}

.back {
  text-align: center;
  opacity: 0.6;
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.popup-box {
  width: 90%;
  max-width: 360px;
  background: #020617;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 40px rgba(139,92,246,0.5);
}

.close {
  position: absolute;
  bottom: 25px;
  right: 20px;
  background: #0ea5e9;
  border: none;
  color: white;
  font-size: 18px;
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>@Cricmatchstream</div>
    <div class="live">● LIVE</div>
  </div>

  <div class="video-card">
    <video id="video" controls playsinline></video>
  </div>

  <!-- TELEGRAM -->
  <div class="card">
    <h3>🔔 Follow us for Updates!</h3>
    <a href="https://t.me/cricmatchstream" target="_blank" class="big-btn">
      📩 Click Here To Join Telegram
    </a>
  </div>

  <!-- SHARE -->
  <div class="card">
    <h3>🔗 Copy Link & Share</h3>
    <a href="#" onclick="sharePage()" class="big-btn">
      🔗 Click Here To Share This Page Link
    </a>
  </div>

  <div class="back">← Back to All Streams</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>📢 Support Us!</h2>
    <p>Join our Telegram channel<br><b>@cricmatchstream</b></p>

    <a href="https://t.me/cricmatchstream" target="_blank" class="big-btn">Join Now</a>
    <br><br>
    <button onclick="closePopup()" class="big-btn" style="background:#1f2937;border:none;">
      Already Joined
    </button>
  </div>

  <button class="close" onclick="closePopup()">✕</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById('video');
const videoSrc = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

/* ADVANCED HLS FIX */
if (Hls.isSupported()) {
  const hls = new Hls({
    debug: false,
    enableWorker: true,
    lowLatencyMode: true
  });

  hls.loadSource(videoSrc);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    video.play().catch(() => {
      video.muted = true;
      video.play();
    });
  });

  /* ERROR HANDLING */
  hls.on(Hls.Events.ERROR, function (event, data) {
    if (data.fatal) {
      switch (data.type) {
        case Hls.ErrorTypes.NETWORK_ERROR:
          hls.startLoad();
          break;
        case Hls.ErrorTypes.MEDIA_ERROR:
          hls.recoverMediaError();
          break;
        default:
          hls.destroy();
          break;
      }
    }
  });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}

/* Share */
function sharePage() {
  if (navigator.share) {
    navigator.share({
      title: "Live Stream",
      url: window.location.href
    });
  } else {
    alert("Copy this link: " + window.location.href);
  }
}

/* Popup */
function closePopup() {
  document.getElementById("popup").style.display = "none";
  localStorage.setItem("popupClosed", "true");
}

window.onload = function() {
  if(localStorage.getItem("popupClosed") === "true") {
    document.getElementById("popup").style.display = "none";
  }
}function welcome() {
        window.open("https://t.me/cricmatchstream");
      }
        const message = "JOIN OUR TELEGRAM CHANNEL FOR MORE LIVE STREAM LINKS";
        if (confirm(message)) {
            window.location.href = "https://t.me/cricmatchstream";
        }
  
</script>

</body>
</html>
